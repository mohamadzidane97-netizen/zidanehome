<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZDN Home – Admin Login</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #ffffff;
      padding: 24px 28px;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      min-width: 320px;
      max-width: 360px;
    }
    h1 {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }
    p.subtitle {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
    }
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    button {
      width: 100%;
      padding: 8px 0;
      border-radius: 999px;
      border: none;
      background: #111;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover {
      opacity: 0.9;
    }
    .flash {
      font-size: 0.8rem;
      margin-bottom: 8px;
      color: #c00;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ZDN Home – Admin</h1>
    <p class="subtitle">Enter your admin password to continue.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <input type="hidden" name="next" value="{{ next_url }}">
      <label>Password</label>
      <input type="password" name="password" required>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
